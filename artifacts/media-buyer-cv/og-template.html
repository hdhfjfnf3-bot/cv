<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    font-family: 'Inter', sans-serif;
    background: #060411;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    padding: 60px 80px;
  }
  
  /* Aurora Background */
  .aurora-orb {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.6;
  }
  .orb-1 { width: 800px; height: 800px; background: radial-gradient(circle, #6d28d9, transparent); top: -300px; left: -200px; }
  .orb-2 { width: 700px; height: 700px; background: radial-gradient(circle, #e8c96d, transparent); opacity: 0.4; top: 100px; right: -250px; }
  .orb-3 { width: 600px; height: 600px; background: radial-gradient(circle, #f43f5e, transparent); opacity: 0.3; bottom: -200px; left: 30%; }
  .orb-4 { width: 400px; height: 400px; background: radial-gradient(circle, #0891b2, transparent); opacity: 0.5; top: 50%; left: -100px; }
  
  .grid-overlay {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(232, 201, 109, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(232, 201, 109, 0.04) 1px, transparent 1px);
    background-size: 72px 72px;
  }

  .content-container {
    position: relative;
    z-index: 10;
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-between;
  }

  /* Left Side: Text */
  .text-box {
    max-width: 650px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 8px 24px;
    border-radius: 100px;
    border: 2px solid rgba(232, 201, 109, 0.4);
    background: rgba(232, 201, 109, 0.1);
    color: #e8c96d;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 30px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 15px #4ade80; }

  h1 {
    font-size: 96px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  
  .gold-text {
    background: linear-gradient(135deg, #f6e8a8 0%, #e8c96d 35%, #f0d98a 60%, #b8952d 80%, #e8c96d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .gradient-text {
    font-size: 48px;
    background: linear-gradient(90deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    font-size: 28px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .url {
    font-size: 28px;
    color: #a78bfa;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Right Side: Profile Photo Frame */
  .photo-frame {
    width: 380px;
    height: 460px;
    border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
    position: relative;
    border: 4px solid rgba(232,201,109,0.8);
    box-shadow: 0 0 60px rgba(124,58,237,0.6), 0 0 120px rgba(232,201,109,0.2);
    overflow: hidden;
  }
  .photo-frame img {
    width: 100%; height: 100%; object-fit: cover; object-position: center top;
  }
  .photo-halo {
    position: absolute; right: 45px; top: 50px;
    width: 440px; height: 520px;
    border-radius: 50% 60% 40% 60% / 60% 40% 60% 40%;
    border: 3px solid rgba(124,58,237,0.5);
  }
</style>
</head>
<body>
  
  <div class="aurora-orb orb-1"></div>
  <div class="aurora-orb orb-2"></div>
  <div class="aurora-orb orb-3"></div>
  <div class="aurora-orb orb-4"></div>
  <div class="grid-overlay"></div>

  <div class="content-container">
    <div class="text-box">
      <div class="badge">
        <div class="dot"></div>
        AVAILABLE FOR WORK
      </div>
      
      <h1>
        Digital<br />
        <span class="gold-text">Media</span> Buyer ✦
      </h1>
      
      <p>Expert in scalable eCommerce growth.<br/>Meta • TikTok • Snapchat</p>
      
      <div class="url">
        🔗 Cairo • Egypt
      </div>
    </div>
    
    <div>
      <div class="photo-halo"></div>
      <div class="photo-frame">
        <img id="img" src="" alt="Profile">
      </div>
    </div>
  </div>

  <script>
    // In Node it's easiest to inject base64 image here before screen-shooting
  </script>
</body>
</html>
